<!DOCTYPE html>
<html>
    <head>

    </head>
    <body>
        <div id="select">

        </div>
        <div id="box">

        </div>
        <div id="linea">
            <button id="closeL" onclick="closeAll()">x</button>

            <input type="text" id="lB" placeholder="input B:">
            <button onclick="lineaMath()" class="enter">Enter</button>
        </div>
        <div id="kvadr">
            <button id="closeK" onclick="closeAll()">x</button>
            <input type="text" id="kA" placeholder="input A:">
            <input type="text" id="kB" placeholder="input B:">
            <input type="text" id="C" placeholder="input C:">
            <button onclick="kvadrMath()" class="enter">Enter</button>
        </div>
        
    </body>
</html>
